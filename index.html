    let currentQ = 0;
    let scores = { A: 0, B: 0, C: 0, D: 0, E: 0 };

    function startTest() {
        document.getElementById('home').style.display = 'none';
        document.getElementById('quiz').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentQ];
        document.getElementById('curtain-label').innerText = q.curtain;
        document.getElementById('q-title').innerText = q.t;
        const optBox = document.getElementById('q-options');
        optBox.innerHTML = '';
        Object.keys(q.o).forEach(key => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = q.o[key];
            btn.onclick = () => selectOption(key);
            optBox.appendChild(btn);
        });
        document.getElementById('progress-bar').style.width = ((currentQ / questions.length) * 100) + '%';
    }

    function selectOption(key) {
        scores[key]++;
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
        renderBox('primary-box', sorted[0][0], "👑 第一旺：核心本命");
        renderBox('secondary-box', sorted[1][0], "✨ 第二旺：潜力加持");
    }

    function renderBox(id, key, title) {
        const data = results[key];
        const box = document.getElementById(id);
        box.style.borderColor = data.color;
        let idolsHtml = '';
        data.idols.forEach(name => {
            const fileName = idolImages[name] || 'placeholder.jpg';
            idolsHtml += `
            <div class="idol-item">
                <img src="${fileName}" alt="${name}" class="idol-img">
                <div class="idol-name">${name}</div>
            </div>`;
        });
        box.innerHTML = `
            <div class="attr-title">${title}</div>
            <div class="attr-name" style="color:${data.color}">${data.name}</div>
            <div class="attr-keywords" style="color:${data.color}">${data.keywords}</div>
            <div class="attr-desc">${data.desc}</div>
            <div class="idol-info">推荐入股爱豆：</div>
            <div class="idol-gallery">${idolsHtml}</div>
        `;
    }

    // 修改后的保存函数
    function saveAsImage(event) {
        const target = document.getElementById('capture-area');
        const btn = event.currentTarget;
        btn.innerText = "正在生成图档...";
        btn.disabled = true;

        html2canvas(target, {
            useCORS: false, 
            backgroundColor: "#16161a", 
            scale: 2, 
        }).then(canvas => {
            const imageData = canvas.toDataURL('image/png');
            
            // 弹出预览层
            const overlay = document.getElementById('preview-overlay');
            const previewImg = document.getElementById('preview-img');
            previewImg.src = imageData;
            overlay.style.display = 'flex';

            btn.innerText = "📸 生成并保存图片";
            btn.disabled = false;
        }).catch(err => {
            console.error("保存失败:", err);
            alert("由于系统权限或本地限制，无法生成图片。请直接手动截屏保存结果。");
            btn.innerText = "📸 生成并保存图片";
            btn.disabled = false;
        });
    }
